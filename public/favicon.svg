<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="56" height="56" rx="16" ry="16" fill="url(#bgGrad)" />

  <!-- Scissors icon (white) matching Logo.jsx paths -->
  <g transform="translate(32,32) rotate(-6) translate(-12,-12) scale(1)" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left circle -->
    <circle cx="6" cy="18" r="3" />
    <!-- Right circle -->
    <circle cx="18" cy="18" r="3" />
    <!-- Left blade -->
    <line x1="20" y1="4" x2="8.12" y2="15.88" />
    <!-- Right blade -->
    <line x1="4" y1="4" x2="15.88" y2="15.88" />
  </g>
</svg>